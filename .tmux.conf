# 1. Cấu hình màu sắc (Dành riêng cho Alacritty)
set -g default-terminal "tmux-256color"
set -as terminal-features ",alacritty:RGB"
set -ga terminal-overrides ",alacritty:Tc"

# 2. Prefix Ctrl-a (Thay cho Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 3. Chuột & Đánh số
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -s escape-time 0

# 4. Chia cửa sổ (Phím | và - cực trực quan)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 5. Di chuyển & Resize như Vim (HJKL)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 6. Copy mode kiểu Vim (Nhấn v để chọn, y để copy)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# 7. Giao diện Everforest
set -g status-style bg='#2d353b',fg='#d3c6aa'
set -g pane-border-style fg='#475258'
set -g pane-active-border-style fg='#a7c080'
